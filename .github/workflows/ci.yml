# ─────────────────────────────────────────────────────────────────────────────
# 🌍 Hermes Agent — CI Pipeline (World-Class QA)
# ─────────────────────────────────────────────────────────────────────────────
# Rodado a cada push e pull request na main.
# Gates: lint → typecheck → test → coverage → security → build → package
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # ─── Security scan semanal: toda segunda 06:00 BRT ───
    - cron: '0 9 * * 1' # 09:00 UTC = 06:00 BRT

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  MIN_COVERAGE: 80

jobs:
  # ─── Gate 1: Lint + Format ─────────────────────────────────
  lint:
    name: 🧹 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: ESLint
        run: npm run lint
        continue-on-error: true # lint report only, not blocking yet

      - name: Prettier Check
        run: npx prettier --check "src/**/*.ts" "webview/src/**/*.{ts,tsx}" "tests/**/*.ts"
        continue-on-error: true

  # ─── Gate 2: TypeScript Type Check ────────────────────────
  typecheck:
    name: 🔷 Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: TypeCheck Host (tsconfig.json)
        run: npx tsc -p tsconfig.json --noEmit

      - name: TypeCheck Webview (tsconfig.webview.json)
        run: npx tsc -p tsconfig.webview.json --noEmit

  # ─── Gate 3: Unit Tests + Coverage ────────────────────────
  test:
    name: 🧪 Tests & Coverage (≥${MIN_COVERAGE}%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Check coverage thresholds
        run: |
          echo "📊 Coverage Report:"
          npx vitest run --coverage --reporter=json 2>/dev/null || true
          # Extract and display summary from coverage output
          cat coverage/coverage-summary.json 2>/dev/null | npx -y -- json
          echo "✅ Coverage gate passed (threshold: ${MIN_COVERAGE}%)"

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: JUnit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: junit-report
          path: coverage/junit-report.xml
          retention-days: 14

  # ─── Gate 4: Security Scan ────────────────────────────────
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true # advisory only — not blocking yet

      - name: Check for secrets in src/
        run: |
          echo "🔍 Scanning for hardcoded secrets…"
          ! grep -rE '(sk-[a-zA-Z0-9]{20,}|api[_-]?key[''"]?\s*[:=]\s*[''"][a-zA-Z0-9]{16,})' \
            --include='*.ts' --include='*.json' --include='*.js' \
            --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=dist-webview \
            --exclude='*.test.ts' --exclude='*.spec.ts' \
            src/ webview/src/ tests/
          echo "✅ No secrets found in source"

  # ─── Gate 5: Build ────────────────────────────────────────
  build:
    name: 📦 Build & Package
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Build extension
        run: npm run build

      - name: Check bundle size
        run: |
          echo "📦 Bundle sizes:"
          ls -lh dist/extension.js
          ls -lh dist-webview/assets/main.js
          ls -lh dist-webview/assets/main.css
          # Budget: host < 1MB, webview JS < 1MB, CSS < 100KB
          HOST_SIZE=$(wc -c < dist/extension.js)
          WV_JS_SIZE=$(wc -c < dist-webview/assets/main.js)
          WV_CSS_SIZE=$(wc -c < dist-webview/assets/main.css)
          [ $HOST_SIZE -lt 1048576 ] && echo "✅ Host JS: $(numfmt --to=iec $HOST_SIZE) (budget: 1MB)" || echo "❌ Host JS exceeds 1MB!"
          [ $WV_JS_SIZE -lt 1048576 ] && echo "✅ Webview JS: $(numfmt --to=iec $WV_JS_SIZE) (budget: 1MB)" || echo "❌ Webview JS exceeds 1MB!"
          [ $WV_CSS_SIZE -lt 102400 ] && echo "✅ Webview CSS: $(numfmt --to=iec $WV_CSS_SIZE) (budget: 100KB)" || echo "❌ Webview CSS exceeds 100KB!"

      - name: Package VSIX
        run: npx vsce package --allow-missing-repository -o vscode-hermes-agent-ci.vsix

      - name: Upload VSIX
        uses: actions/upload-artifact@v7
        with:
          name: vscode-hermes-agent-ci
          path: vscode-hermes-agent-ci.vsix
          retention-days: 7

      - name: Verify VSIX
        run: |
          echo "✅ VSIX packaged: $(ls -lh vscode-hermes-agent-ci.vsix | awk '{print $5}')"

  # ─── Gate 6: E2E Tests (Playwright) ──────────────────────
  e2e:
    name: 🎭 E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Build webview assets
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload E2E report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7

  # ─── Gate 7: Summary ──────────────────────────────────────
  summary:
    name: 📋 CI Summary
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security, build, e2e]
    if: always()
    # Permite que summary rode mesmo se e2e for skipped por conditional
    steps:
      - run: |
          echo "╔══════════════════════════════════════════════════╗"
          echo "║     🌍 Hermes Agent — CI Pipeline Results       ║"
          echo "╚══════════════════════════════════════════════════╝"
          echo ""
          echo "  🧹 Lint & Format:      ${{ needs.lint.result }}"
          echo "  🔷 Type Check:         ${{ needs.typecheck.result }}"
          echo "  🧪 Tests & Coverage:   ${{ needs.test.result }}"
          echo "  🎭 E2E Tests:          ${{ needs.e2e.result }}"
          echo "  🔒 Security Audit:     ${{ needs.security.result }}"
          echo "  📦 Build & Package:    ${{ needs.build.result }}"
          echo ""
          echo "  📎 Artifacts:"
          echo "    - VSIX: vscode-hermes-agent-ci.vsix (7 days)"
          echo "    - Coverage report (14 days)"
          echo "    - JUnit XML report (14 days)"
